name: yatrapass
description: "A modern digital transit platform for Nepal with QR ticketing, digital wallet, and intelligent fare management."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.3.0

  # UI
  flutter_svg: ^2.2.0
  flutter_animate: ^4.5.2
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.2
  shimmer: ^3.0.0
  gap: ^3.0.1
  lottie: ^3.3.1

  # OTP
  pinput: ^5.0.1

  # Storage
  shared_preferences: ^2.5.3

  # Network
  dio: ^5.10.0

  # Utilities
  intl: ^0.20.2
  logger: ^2.6.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  flutter_secure_storage: ^10.3.1
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo/
    - assets/images/illustrations/
    - assets/images/onboarding/
    - assets/icons/
    - assets/icons/svg/
    - assets/animations/
    - assets/sounds/